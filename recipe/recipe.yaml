schema_version: 1

context:
  name: semantikon
  version: "1.1.0"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 3b6e82b95d72e115e0c2211a2e30dc907ce038a12ed5821fea6cb3a8a95bea1a

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - bagofholding >=0.1.5,<=0.1.11
    - flowrep ==0.4.1
    - python >=${{ python_min }},<3.15
    - python-graphviz >=0.20.3,<=0.21
    - networkx >=3.5,<3.7
    - numpy >=2.3.0,<2.5.0
    - owlrl >=7.1.2,<7.2.0
    - pint >=0.24,<=0.25.3
    - rdflib >=7.1.1,<7.7.0
    - pyshacl >=0.30.0,<=0.31.0
    - requests >=2.28.0,<2.34.0
    - typeguard >=4.0.0,<4.6.0

tests:
  - python:
      imports:
        - semantikon
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: semantikon - Ontological type system
  description: |
    In the realm of the workflow management systems, there are well defined inputs and outputs for each node. semantikon is a Python package to give scientific context to node inputs and outputs by providing type hinting and interpreters.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/pyiron/semantikon
  repository: https://github.com/pyiron/semantikon
  documentation: https://semantikon.readthedocs.io/

extra:
  recipe-maintainers:
    - jan-janssen
    - samwaseda
    - liamhuber
