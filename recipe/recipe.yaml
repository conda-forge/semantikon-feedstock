schema_version: 1

context:
  name: semantikon
  version: 1.3.2
  python_min: '3.11'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 0c252a318a537d1cd0d35f1cb7bf5c1b05f9fcfcbd99928311f61b985b771e56

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - bagofholding >=0.1.5,<0.2.0
    - flowrep >=0.5.1,<0.6.0
    - python >=${{ python_min }},<3.15
    - python-graphviz >=0.20.3,<=0.21
    - networkx >=3.5,<3.7.0
    - numpy >=2.3.0,<2.5.0
    - owlrl >=7.1.2,<7.2.0
    - pint >=0.24,<=0.25.3
    - rdflib >=7.1.1,<7.7.0
    - pyshacl >=0.30.0,<=0.31.0
    - requests >=2.28.0,<2.35.0
    - typeguard >=4.0.0,<4.6.0
tests:
  - python:
      imports:
        - semantikon
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: semantikon - Ontological type system
  description: |
    In the realm of the workflow management systems, there are well defined inputs and outputs for each node. semantikon is a Python package to give scientific context to node inputs and outputs by providing type hinting and interpreters.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/pyiron/semantikon
  repository: https://github.com/pyiron/semantikon
  documentation: https://semantikon.readthedocs.io/

extra:
  recipe-maintainers:
    - jan-janssen
    - samwaseda
    - liamhuber
